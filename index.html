<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raj Rawat | Official</title>
    


    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            background-color: rgba(10, 0, 0, 0.95);
            width: 340px;
            padding: 40px 20px;
            border-radius: 28px;
            text-align: center;
            border: 1px solid #400;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.2); 
            position: relative;
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            animation: focus-zoom 3s infinite ease-in-out;
        }

        h1 {
            font-size: 26px;
            text-transform: uppercase;
            margin: 10px 0;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 2px 2px 0px #800;
        }

        .sub-headline {
            color: #ff0000;
            font-weight: 800;
            font-size: 13px;
            margin-bottom: 30px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .cta-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #800 0%, #ff0000 50%, #800 100%);
            background-size: 200% auto;
            color: #fff;
            text-decoration: none;
            padding: 22px;
            border-radius: 12px; 
            font-size: 22px;
            font-weight: 900;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            border: 2px solid #300;
            animation: flow 3s linear infinite, vibrate 0.1s infinite;
        }

        .cta-button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2);
            animation: glitch-swipe 2s infinite;
        }

        @keyframes flow {
            to { background-position: 200% center; }
        }

        @keyframes vibrate {
            0% { transform: translate(0); }
            25% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); }
            75% { transform: translate(1px, 1px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch-swipe {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        @keyframes focus-zoom {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }

        .trust-text {
            margin-top: 25px;
            font-size: 15px;
            color: #fff;
            font-weight: 800;
            text-shadow: 0 0 10px #ff0000;
        }

        .footer-details {
            margin-top: 15px;
            font-size: 11px;
            color: #666;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .ajs-footer {
            margin-top: 25px;
            background: #200;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 11px;
            color: #ff0000;
            text-decoration: none;
            border: 1px solid #500;
            text-transform: uppercase;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-wrapper">
            <img src="moneymaker.jpg" alt="RAJ RAWAT" class="profile-img">
        </div>

        <h1>𝐕𝐈𝐏 𝐂𝐎𝐌𝐏𝐀𝐍𝐘 𝐒𝐔𝐑𝐄-𝐁𝐄𝐓</h1>
        <div class="sub-headline">100% NUMBER FIXER | PREDICTION KING</div>

        <a href="" class="cta-button" id="mainCTA">
            JOIN TELEGRAM ⚡
        </a>

        <div class="trust-text">★ 50,000+ MEMBERS ACROS INDIA ★</div>
        
        <div class="footer-details">
             KING OF COLOUR ANALYSIS
        </div>
    </div>

    <a href="https://t.me/Richard_Carter7" class="ajs-footer">ads by Raj</a>

 

</body>
</html>
